<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="${pageTitle != null ? pageTitle + ' - Zeus IMS' : 'Zeus IMS'}">Zeus IMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <th:block th:fragment="extra-css"></th:block>
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary" sec:authorize="isAuthenticated()">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="fas fa-warehouse me-2"></i>Zeus IMS
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}" th:classappend="${#request.requestURI == '/dashboard' ? 'active' : ''}">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasAuthority('OWNER')">
                        <a class="nav-link" th:href="@{/users}" th:classappend="${#strings.startsWith(#request.requestURI, '/users') ? 'active' : ''}">
                            <i class="fas fa-users me-1"></i>Users
                        </a>
                    </li>

                    <li class="nav-item dropdown" sec:authorize="hasAnyAuthority('OWNER', 'SALES', 'PRODUCTION_MANAGER')">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-cogs me-1"></i>Management
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li sec:authorize="hasAnyAuthority('OWNER', 'SALES')">
                                <a class="dropdown-item" th:href="@{/customers}">
                                    <i class="fas fa-building me-2"></i>Customers
                                </a>
                            </li>
                            <li sec:authorize="hasAnyAuthority('OWNER', 'SALES')">
                                <a class="dropdown-item" th:href="@{/vendors}">
                                    <i class="fas fa-truck me-2"></i>Vendors
                                </a>
                            </li>
                            <li sec:authorize="hasAnyAuthority('OWNER', 'SALES', 'PRODUCTION_MANAGER')">
                                <a class="dropdown-item" th:href="@{/products}">
                                    <i class="fas fa-box me-2"></i>Products
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li sec:authorize="hasAnyAuthority('OWNER', 'SALES')">
                                <a class="dropdown-item" th:href="@{/enquiries}">
                                    <i class="fas fa-question-circle me-2"></i>Enquiries
                                </a>
                            </li>
                            <li sec:authorize="hasAnyAuthority('OWNER', 'SALES', 'PRODUCTION_MANAGER')">
                                <a class="dropdown-item" th:href="@{/orders}">
                                    <i class="fas fa-shopping-cart me-2"></i>Orders
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle me-1"></i>
                            <span sec:authentication="principal.fullName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="fas fa-user me-2"></i>Profile
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="d-inline w-100">
                                    <button type="submit" class="dropdown-item text-danger w-100 text-start">
                                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>

                    <!-- Quick Logout Button -->
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2" title="Logout">
                                <i class="fas fa-sign-out-alt"></i>
                                <span class="d-none d-md-inline ms-1">Logout</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div th:fragment="alerts">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <main th:fragment="content" class="container-fluid py-4" sec:authorize="isAuthenticated()">
        <div th:replace="this :: alerts"></div>
        <th:block th:fragment="page-content"></th:block>
    </main>

    <div sec:authorize="!isAuthenticated()">
        <th:block th:fragment="content"></th:block>
    </div>

    <!-- Move Bootstrap and jQuery scripts to the body for proper loading order -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // Ensure Bootstrap dropdowns are properly initialized
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize all Bootstrap dropdowns
            var dropdownElementList = [].slice.call(document.querySelectorAll('.dropdown-toggle'));
            var dropdownList = dropdownElementList.map(function (dropdownToggleEl) {
                return new bootstrap.Dropdown(dropdownToggleEl);
            });

            // Auto-dismiss alerts after 5 seconds
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alertElement) {
                if (typeof bootstrap !== 'undefined') {
                    const bsAlert = new bootstrap.Alert(alertElement);
                    setTimeout(function() {
                        if (alertElement && alertElement.parentNode) {
                            bsAlert.close();
                        }
                    }, 5000);
                }
            });
        });
    </script>

    <script th:fragment="alert-js">
        // Auto-dismiss alerts after 5 seconds (for individual page usage)
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for Bootstrap to be available
            function initializeAlerts() {
                if (typeof bootstrap !== 'undefined') {
                    const alerts = document.querySelectorAll('.alert');
                    alerts.forEach(function(alertElement) {
                        // Initialize Bootstrap Alert component
                        const bsAlert = new bootstrap.Alert(alertElement);

                        // Set up auto-dismiss timer
                        setTimeout(function() {
                            if (alertElement && alertElement.parentNode) {
                                bsAlert.close();
                            }
                        }, 5000); // 5 seconds
                    });
                } else {
                    // Retry after a short delay if Bootstrap isn't loaded yet
                    setTimeout(initializeAlerts, 100);
                }
            }

            initializeAlerts();
        });
    </script>
    <!-- Complete JavaScript bundle for pages using fragment replacement -->
    <div th:fragment="js-bundle">
        <!-- Bootstrap Bundle (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <!-- Alert functionality -->
        <script th:replace="this :: alert-js"></script>
    </div>

    <th:block th:fragment="extra-js"></th:block>

    <script>
        // Session Management and Auto-Logout Functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Session timeout configuration (30 minutes = 1800 seconds)
            const SESSION_TIMEOUT = 1800 * 1000; // 30 minutes in milliseconds
            const WARNING_TIME = 300 * 1000; // 5 minutes warning before timeout
            const CHECK_INTERVAL = 60 * 1000; // Check every minute

            let lastActivity = Date.now();
            let warningShown = false;
            let timeoutWarningModal = null;

            // Initialize Bootstrap dropdowns
            var dropdownElementList = [].slice.call(document.querySelectorAll('.dropdown-toggle'));
            var dropdownList = dropdownElementList.map(function (dropdownToggleEl) {
                return new bootstrap.Dropdown(dropdownToggleEl);
            });

            // Auto-dismiss alerts after 5 seconds
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alertElement) {
                if (typeof bootstrap !== 'undefined') {
                    const bsAlert = new bootstrap.Alert(alertElement);
                    setTimeout(function() {
                        if (alertElement && alertElement.parentNode) {
                            bsAlert.close();
                        }
                    }, 5000);
                }
            });

            // Track user activity
            function trackActivity() {
                lastActivity = Date.now();
                warningShown = false;
                if (timeoutWarningModal) {
                    timeoutWarningModal.hide();
                }
            }

            // Events that indicate user activity
            const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
            activityEvents.forEach(function(event) {
                document.addEventListener(event, trackActivity, { passive: true });
            });

            // Check session timeout
            function checkSessionTimeout() {
                const now = Date.now();
                const timeSinceLastActivity = now - lastActivity;

                if (timeSinceLastActivity >= SESSION_TIMEOUT) {
                    // Session expired - force logout
                    showSessionExpiredMessage();
                    setTimeout(() => {
                        window.location.href = '/logout';
                    }, 2000);
                } else if (timeSinceLastActivity >= (SESSION_TIMEOUT - WARNING_TIME) && !warningShown) {
                    // Show warning 5 minutes before timeout
                    showTimeoutWarning();
                    warningShown = true;
                }
            }

            // Show timeout warning modal
            function showTimeoutWarning() {
                const remainingTime = Math.ceil((SESSION_TIMEOUT - (Date.now() - lastActivity)) / 1000 / 60);

                // Create warning modal if it doesn't exist
                if (!document.getElementById('sessionTimeoutModal')) {
                    const modalHtml = `
                        <div class="modal fade" id="sessionTimeoutModal" tabindex="-1" aria-labelledby="sessionTimeoutModalLabel" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header bg-warning text-dark">
                                        <h5 class="modal-title" id="sessionTimeoutModalLabel">
                                            <i class="fas fa-exclamation-triangle me-2"></i>Session Timeout Warning
                                        </h5>
                                    </div>
                                    <div class="modal-body">
                                        <p>Your session will expire in <strong id="remainingTime">${remainingTime}</strong> minutes due to inactivity.</p>
                                        <p>Click "Stay Logged In" to continue your session or you will be automatically logged out.</p>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-primary" id="stayLoggedInBtn">
                                            <i class="fas fa-clock me-2"></i>Stay Logged In
                                        </button>
                                        <button type="button" class="btn btn-secondary" id="logoutNowBtn">
                                            <i class="fas fa-sign-out-alt me-2"></i>Logout Now
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    document.body.insertAdjacentHTML('beforeend', modalHtml);

                    // Add event listeners
                    document.getElementById('stayLoggedInBtn').addEventListener('click', function() {
                        trackActivity(); // Reset activity timer
                        if (timeoutWarningModal) {
                            timeoutWarningModal.hide();
                        }
                    });

                    document.getElementById('logoutNowBtn').addEventListener('click', function() {
                        window.location.href = '/logout';
                    });
                }

                // Show the modal
                timeoutWarningModal = new bootstrap.Modal(document.getElementById('sessionTimeoutModal'));
                timeoutWarningModal.show();
            }

            // Show session expired message
            function showSessionExpiredMessage() {
                // Remove any existing warning modal
                if (timeoutWarningModal) {
                    timeoutWarningModal.hide();
                }

                // Show session expired alert
                const alertHtml = `
                    <div class="alert alert-danger alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x" style="z-index: 9999; margin-top: 20px;" role="alert">
                        <i class="fas fa-clock me-2"></i>
                        <strong>Session Expired!</strong> You have been logged out due to inactivity.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                document.body.insertAdjacentHTML('afterbegin', alertHtml);
            }

            // Start session timeout checking
            setInterval(checkSessionTimeout, CHECK_INTERVAL);

            // Keep session alive with periodic heartbeat
            function sendHeartbeat() {
                fetch('/dashboard', {
                    method: 'HEAD',
                    credentials: 'same-origin'
                }).catch(() => {
                    // If heartbeat fails, session might be expired
                    console.log('Session heartbeat failed');
                });
            }

            // Send heartbeat every 10 minutes
            setInterval(sendHeartbeat, 600000);
        });
    </script>
</body>
</html>
