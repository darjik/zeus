<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/main :: head">
    <title>Personnel Details - Zeus IMS</title>
</head>
<body>
    <nav th:replace="layout/main :: navbar"></nav>

    <main class="container-fluid py-4">
        <div th:replace="layout/main :: alerts"></div>

        <div class="row mb-4">
            <div class="col-md-8">
                <h1 class="h3 mb-0">
                    <i class="fas fa-user me-2 text-primary"></i>Personnel Details
                </h1>
                <p class="text-muted">
                    View personnel information for <strong th:text="${customer.companyName}">Company Name</strong>
                </p>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/customers/{customerId}/personnel/edit/{personnelId}(customerId=${customer.id}, personnelId=${personnel.id})}"
                   class="btn btn-primary me-2">
                    <i class="fas fa-edit me-2"></i>Edit Personnel
                </a>
                <a th:href="@{/customers/{id}/personnel(id=${customer.id})}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Personnel
                </a>
            </div>
        </div>

        <!-- Customer Summary -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm bg-light">
                    <div class="card-body py-3">
                        <div class="d-flex align-items-center">
                            <div class="avatar-circle me-3 bg-info">
                                <i class="fas fa-building"></i>
                            </div>
                            <div>
                                <h6 class="mb-1" th:text="${customer.companyName}">Company Name</h6>
                                <div class="text-muted small">
                                    <a th:href="@{/customers/view/{id}(id=${customer.id})}" class="text-decoration-none">
                                        <i class="fas fa-eye me-1"></i>View Customer Details
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <div class="avatar-large mb-3" th:classappend="${personnel.isPrimaryContact ? 'bg-warning' : 'bg-success'}">
                            <i class="fas fa-user fa-3x"></i>
                        </div>
                        <h4 th:text="${personnel.fullName}">Full Name</h4>
                        <p class="text-muted mb-3" th:if="${personnel.designation}" th:text="${personnel.designation}">Designation</p>

                        <div class="mb-3">
                            <span th:if="${personnel.isPrimaryContact}" class="badge bg-warning text-dark fs-6">
                                <i class="fas fa-star me-1"></i>Primary Contact
                            </span>
                            <span th:unless="${personnel.isPrimaryContact}" class="badge bg-secondary fs-6">
                                <i class="fas fa-user me-1"></i>Personnel
                            </span>
                        </div>

                        <div class="mt-3">
                            <span th:if="${personnel.active}" class="badge bg-success fs-6">
                                <i class="fas fa-check-circle me-1"></i>Active
                            </span>
                            <span th:unless="${personnel.active}" class="badge bg-danger fs-6">
                                <i class="fas fa-times-circle me-1"></i>Inactive
                            </span>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mt-4" th:if="${personnel.notes}">
                    <div class="card-header bg-light">
                        <h6 class="card-title mb-0">
                            <i class="fas fa-sticky-note me-2"></i>Notes
                        </h6>
                    </div>
                    <div class="card-body">
                        <p class="mb-0" th:text="${personnel.notes}">Personnel notes</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-light">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-info-circle me-2"></i>Personal Information
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.fullName}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.email ?: 'Not provided'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Primary Contact</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.contactNumber ?: 'Not provided'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Secondary Contact</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone-alt"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.secondaryContact ?: 'Not provided'}" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mt-4">
                    <div class="card-header bg-light">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-briefcase me-2"></i>Professional Information
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">Department</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-building-user"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.department ?: 'Not specified'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Designation</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user-tie"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.designation ?: 'Not specified'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Contact Type</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-star"></i></span>
                                    <input type="text" class="form-control"
                                           th:value="${personnel.isPrimaryContact ? 'Primary Contact' : 'Regular Personnel'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Status</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-toggle-on"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.active ? 'Active' : 'Inactive'}" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mt-4">
                    <div class="card-header bg-light">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-clock me-2"></i>Activity Information
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">Created Date</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-calendar-plus"></i></span>
                                    <input type="text" class="form-control"
                                           th:value="${#temporals.format(personnel.createdAt, 'MMMM dd, yyyy HH:mm')}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Created By</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user-plus"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.createdBy ?: 'System'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Last Updated</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-calendar-check"></i></span>
                                    <input type="text" class="form-control"
                                           th:value="${personnel.updatedAt != null ? #temporals.format(personnel.updatedAt, 'MMMM dd, yyyy HH:mm') : 'Never'}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">Updated By</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user-edit"></i></span>
                                    <input type="text" class="form-control" th:value="${personnel.updatedBy ?: 'N/A'}" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0 auto;
        }
        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .form-control[readonly] {
            background-color: #f8f9fa;
            border-color: #e9ecef;
        }
    </style>
</body>
</html>
